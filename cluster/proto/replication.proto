syntax = "proto3";
package swytch.cluster.v1;

option go_package = "github.com/swytchdb/cache/cluster/proto";

import "google/protobuf/timestamp.proto";

// --- Decision tree axes ---

enum EffectOp {
  UNKNOWN_OP = 0;
  INSERT_OP = 1;
  REMOVE_OP = 2;
}

// MergeRule determines how concurrent values combine during reconstruction.
enum MergeRule {
  LAST_WRITE_WINS = 0;   // Higher HLC wins (string SET, ZADD absolute)
  ADDITIVE_INT = 1;      // Sum int64 deltas (INCR)
  ADDITIVE_FLOAT = 2;    // Sum float64 deltas (INCRBYFLOAT, ZINCRBY)
  MAX_INT = 3;           // Take maximum (HLL registers)
  FIRST_WRITE_WINS = 4;  // Lower HLC wins (serialization request/release)
  MAX_BYTES = 5;         // Element-wise max of raw byte arrays (HLL registers)
}

// CollectionKind determines how elements are tracked within a key.
enum CollectionKind {
  SCALAR = 0;   // Single value per key (string, counter)
  KEYED = 1;    // Named elements: member/field/entry (set, hash, zset)
  ORDERED = 2;  // Positionally ordered elements (list)
}

// Placement determines position semantics for mutations.
enum Placement {
  PLACE_NONE = 0;    // Default (scalar overwrite, keyed add/remove)
  PLACE_HEAD = 1;    // Insert at head (list LPUSH)
  PLACE_TAIL = 2;    // Insert at tail / append (list RPUSH, string APPEND)
  PLACE_AFTER = 3;   // After reference element (LINSERT AFTER, SETRANGE)
  PLACE_BEFORE = 4;  // Before reference element (LINSERT BEFORE)
  PLACE_SELF = 5;    // Operate on existing element (update/tombstone)
}

// --- Effect: the fundamental unit of state change ---

// DataEffect carries a mutation to a key's value.
message DataEffect {
  EffectOp op = 1;
  MergeRule merge = 2;
  CollectionKind collection = 3;
  Placement placement = 4;
  bytes reference = 5;   // pivot element ID for AFTER/BEFORE placement
  bytes id = 6;          // element ID (nil for scalar operations)
  oneof value {
    bytes raw = 10;
    sint64 int_val = 11;
    double float_val = 12;
  }
}

enum ValueType {
  TYPE_UNSPECIFIED = 0;
  TYPE_STRING = 1;
  TYPE_LIST = 2;
  TYPE_HASH = 3;
  TYPE_SET = 4;
  TYPE_ZSET = 5;
  TYPE_STREAM = 6;
  TYPE_HLL = 7;
  TYPE_BITMAP = 8;
  TYPE_GEO = 9;
}

// MetaEffect marks a causal dependency without changing state.
// Used for metadata-only mutations like TTL updates.
message MetaEffect {
  google.protobuf.Timestamp expires_at = 1;  // non-zero = metadata update (TTL), zero = pure read marker
  ValueType type_tag = 2; // non-zero = declares type for reconstruction
  bytes element_id = 3;   // when set, expires_at targets this specific element within a KEYED collection
}

// NoopEffect marks a causal dependency used to detect phantom reads/writes in transactions.
message NoopEffect {}

message EffectRef {
  uint64 NodeId = 1;
  uint64 Offset = 2;
}

// TransactionalBindEffect atomically joins branches across multiple keys.
message TransactionalBindEffect {
  message KeyBind {
    bytes key = 1;
    repeated uint64 heads = 2;           // branch tips for this key
    repeated EffectRef consumed_tips = 3;   // tips at tx start (for fork identification)
    EffectRef new_tip = 4;                  // last effect offset per key
  }
  repeated KeyBind keys = 1;
  google.protobuf.Timestamp txn_hlc = 2;                      // originator HLC for FWW
  uint64 originator_node_id = 3;           // originator node
  repeated EffectRef abort_deps = 4;       // competing tx effects being folded
}

// ReducedElement is a single element within a KEYED or ORDERED collection after reduction.
message ReducedElement {
  DataEffect data = 1;
  google.protobuf.Timestamp hlc = 2;
  uint64 node_id = 3;
  google.protobuf.Timestamp expires_at = 4;
  bytes fork_choice_hash = 5;  // for element-level winner selection
}

// ReducedEffect is the canonical materialized state of a key.
// Produced by reducing a linear chain of effects (ReduceBranch) or merging
// concurrent branches (Merge2/MergeN).
message ReducedEffect {
  EffectOp op = 1;
  MergeRule merge = 2;
  CollectionKind collection = 3;
  google.protobuf.Timestamp hlc = 4;
  uint64 node_id = 5;
  bool commutative = 6;

  // SCALAR result
  DataEffect scalar = 10;

  // KEYED result (hash, set, zset, HLL, stream)
  map<string, ReducedElement> net_adds = 11;
  map<string, bool> net_removes = 12;

  // ORDERED result (list)
  repeated ReducedElement ordered_elements = 13;

  // Metadata
  ValueType type_tag = 20;
  google.protobuf.Timestamp expires_at = 21;

  // Subscription tracking
  map<uint64, bool> subscribers = 22;

  // Serialization leader (absent = no serialization active)
  optional uint64 serialization_leader = 23;

  // Fork-choice hash propagated from the tip effect during reduction
  bytes fork_choice_hash = 24;
}

// SnapshotEffect stores a materialized state that short-circuits DAG walking.
// todo: DO NOT IMPLEMENT
message SnapshotEffect {
  CollectionKind collection = 1;  // what kind of state is serialized
  ReducedEffect state = 2;       // materialized state
}

// TypedValue is a tagged literal used in Predicate comparisons and
// in the column tuple of a RowWriteEffect. The Kind tag selects
// which payload field is meaningful.
message TypedValue {
  enum Kind {
    NULL_VALUE = 0;
    INT = 1;
    FLOAT = 2;
    TEXT = 3;
    BLOB = 4;
  }
  Kind kind = 1;
  int64 int_val = 2;
  double float_val = 3;
  string text_val = 4;
  bytes blob_val = 5;
}

// PredicateCmpOp is the comparison operator for a Predicate.CMP or
// Predicate.COL_CMP term.
enum PredicateCmpOp {
  CMP_EQ = 0;
  CMP_LT = 1;
  CMP_LE = 2;
  CMP_GT = 3;
  CMP_GE = 4;
}

// Predicate is a boolean expression tree describing the sub-DAG a
// transaction observed during a read. Exactly one payload group is
// meaningful, discriminated by Kind:
//
//   BOOL     -> bool_val
//   AND / OR -> children
//   NOT      -> child
//   CMP      -> col, op, literal
//   COL_CMP  -> col, op, col2
//   IS_NULL  -> col
message Predicate {
  enum Kind {
    BOOL = 0;
    AND = 1;
    OR = 2;
    NOT = 3;
    CMP = 4;
    COL_CMP = 5;
    IS_NULL = 6;
  }
  Kind kind = 1;
  bool bool_val = 2;
  repeated Predicate children = 3;
  Predicate child = 4;
  uint32 col = 5;
  uint32 col2 = 6;
  PredicateCmpOp op = 7;
  TypedValue literal = 8;
}

// ObservationEffect records a sub-DAG observation made by a
// transaction. Emitted during scans at the table-identity key
// (s/<table>); fork-choice evaluates the predicate against
// concurrent RowWriteEffects arriving at the same key and triggers
// a conflict when a write satisfies the predicate.
//
// The column ordinals referenced in the predicate are pinned to the
// schema tip at observation time; any subsequent ALTER COLUMN
// forks the table-identity key and aborts the observing transaction
// via the usual fork-choice mechanism.
message ObservationEffect {
  Predicate predicate = 1;
}

// RowWriteEffect carries the full column tuple of a row-level
// INSERT/UPDATE/DELETE. Emitted alongside the per-column
// DataEffects that drive reduction, but attached to the
// table-identity key (s/<table>) so predicate evaluation in
// fork-choice sees all writes to the table at a single check-point.
//
// For INSERTs and UPDATEs, `columns` is the effective post-commit
// tuple (carry-forward already applied). For DELETEs, `columns` is
// the pre-deletion state so observations like `role = 'admin'` can
// be evaluated against the row that was there.
message RowWriteEffect {
  enum Kind {
    INSERT = 0;
    UPDATE = 1;
    DELETE = 2;
  }
  bytes pk = 1;
  Kind kind = 2;
  repeated TypedValue columns = 3;
}

// SubscriptionEffect declares interest (or loss of interest) in a key.
// Fully commutative with all other effects.
message SubscriptionEffect {
  uint64 subscriber_node_id = 1;
  bool unsubscribe = 2;  // false = subscribe, true = unsubscribe
  bool discovery = 3;    // true = anti-entropy probe, just NACK back with tips, don't store
}

// SerializationEffect requests or releases per-key serialized coordination.
// FWW among themselves, commutative with data effects.
message SerializationEffect {
  uint64 leader_node_id = 1;
  bool release = 2;  // false = request serialization, true = release
}

// Effect is the top-level envelope stored in the log and sent over the wire.
message Effect {
  // Identity & causality
  bytes key = 1;
  google.protobuf.Timestamp hlc = 2;
  uint64 node_id = 3;              // originating node
  repeated EffectRef deps = 4;    // causal dependencies (empty = root)
  string txn_id = 5;              // transaction ID (empty = non-transactional)
  bytes fork_choice_hash = 6;     // SHA-256(node_id_LE8 || hlc_LE8), computed at emit time

  // The effect payload — exactly one of these is set.
  oneof kind {
    DataEffect data = 10;
    MetaEffect meta = 11;
    // field 12 removed (was BindEffect, now replaced by multi-dep effects)
    TransactionalBindEffect txn_bind = 13;
    SnapshotEffect snapshot = 14;
    SubscriptionEffect subscription = 15;
    SerializationEffect serialization = 16;
    NoopEffect noop = 17;
    ObservationEffect observation = 18;
    RowWriteEffect row_write = 19;
  }
}

// OffsetNotify is broadcast after every local write
message OffsetNotify {
  EffectRef origin = 1;              // where this effect lives
  google.protobuf.Timestamp hlc = 2; // effect's HLC timestamp (for causality ordering)
  repeated EffectRef deps = 3;       // parent effects (0 = root, 1 = linear, 2 = bind)
  bytes key = 4;                     // Redis key
  bytes effect_data = 5;             // eagerly-pushed effect bytes (same-region only)
  uint64 send_time = 6;              // wall clock at send time (ns) for drift measurement
  bytes trace_context = 7;           // OTel trace context (26 bytes, optional)
}

// FetchRequest asks the origin for effect bytes
message FetchRequest {
  EffectRef ref = 1;
}

// FetchResponse returns the serialized effect bytes
message FetchResponse {
  EffectRef ref = 1;
  bytes effect_data = 2;
}

// NackTipDetail provides metadata about a competing tip to avoid extra fetches.
message NackTipDetail {
  EffectRef ref = 1;                   // the tip's identity (node_id + offset)
  google.protobuf.Timestamp hlc = 2;
  bool is_transactional = 4;
  bool is_data = 5;                    // true = DataEffect
  bool is_bind = 6;                    // true = TransactionalBindEffect
  google.protobuf.Timestamp bind_hlc = 7;                // the bind's txn_hlc (for FWW comparison)
  CollectionKind collection = 8;
  bytes element_id = 9;
  EffectOp op = 10;
  repeated EffectRef deps = 11;
  uint64 bind_node_id = 12;
  bytes bind_fork_choice_hash = 13;
  repeated KeyConsumedTips bind_consumed_tips = 14; // per-key consumed tips for bindsShareBase check
}

// KeyConsumedTips carries a bind's consumed tips for one key.
message KeyConsumedTips {
  bytes key = 1;
  repeated EffectRef consumed_tips = 2;
}

// NackNotify signals a causal conflict on a key.
// Sent when a received effect's deps don't match the receiver's current tips.
message NackNotify {
  bytes key = 1;                    // the key with the conflict
  EffectRef conflicting = 2;         // the effect that triggered the conflict
  repeated EffectRef tips = 3;       // sender's full tip set for this key
  repeated NackTipDetail tip_details = 4;  // metadata per tip for smart conflict detection
}

// ForwardedTransaction carries an entire transaction to be executed on
// the serialization leader. The leader executes all commands atomically
// and returns the raw RESP wire bytes.
message ForwardedTransaction {
  repeated ForwardedCommand commands = 1;
  repeated bytes watched_keys = 2;   // WATCH keys if any
  uint64 origin_node = 3;
  string authorized_user = 5;        // already-authenticated user from origin node (for ACL enforcement)
}

message ForwardedCommand {
  bytes command_name = 1;
  repeated bytes args = 2;
}

message ForwardedResponse {
  bytes resp_data = 1;          // raw RESP wire bytes for entire tx result
  bool error = 2;
  string error_message = 3;
}

service Replication {
  // NotifyStream is a bidirectional stream for offset notifications.
  // Each peer opens one stream; both sides send OffsetNotify messages.
  rpc NotifyStream(stream OffsetNotify) returns (stream OffsetNotify);

  // Fetch retrieves effect bytes by offset from the origin node.
  rpc Fetch(FetchRequest) returns (FetchResponse);
}
