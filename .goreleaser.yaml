version: 2

project_name: swytch

before:
  hooks:
    - go mod tidy

builds:
  - id: swytch
    main: .
    binary: swytch
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - readme.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

sboms:
  - artifacts: archive

dockers_v2:
  - id: swytch
    images:
      - 'ghcr.io/swytchdb/swytch'
    tags:
      - '{{ .Version }}'
      - '{{ if not .Prerelease }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.goreleaser
    labels:
      org.opencontainers.image.title: '{{ .ProjectName }}'
      org.opencontainers.image.description: 'Swytch distributed cache and database'
      org.opencontainers.image.url: 'https://github.com/swytchdb/cache'
      org.opencontainers.image.source: 'https://github.com/swytchdb/cache'
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.revision: '{{ .FullCommit }}'
      org.opencontainers.image.licenses: 'AGPL-3.0-or-later'

signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - --yes
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - sign
      - '${artifact}@${digest}'
      - --yes
    output: true

brews:
  - name: swytch
    repository:
      owner: swytchdb
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    directory: Formula
    homepage: 'https://github.com/swytchdb/cache'
    description: 'Distributed cache and database with Redis, Memcached, and SQL frontends'
    license: 'AGPL-3.0-or-later'
    commit_msg_template: 'Update swytch to {{ .Tag }}'
    test: |
      system "#{bin}/swytch", "--version"
    install: |
      bin.install "swytch"

release:
  github:
    owner: swytchdb
    name: cache
  draft: false
  prerelease: auto
  mode: append
